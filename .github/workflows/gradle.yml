name: Java CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - '**'

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: realworld
          POSTGRES_USER: teste123
          POSTGRES_PASSWORD: "12345"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Test with Gradle
      run: ./gradlew --no-daemon clean test
      env:
        SPRING_PROFILES_ACTIVE: postgres
        REALWORLD_POSTGRES_URL: jdbc:postgresql://localhost:5432/realworld
        REALWORLD_POSTGRES_USERNAME: teste123
        REALWORLD_POSTGRES_PASSWORD: "12345"
