# PostgreSQL/JPA/Flyway profile.
# Phase 4 Slice 9 (#26): JPA/PostgreSQL is the only active persistence path after parity.
spring.datasource.url=${REALWORLD_POSTGRES_URL:jdbc:postgresql://localhost:55432/realworld}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${REALWORLD_POSTGRES_USERNAME:teste123}
spring.datasource.password=${REALWORLD_POSTGRES_PASSWORD:12345}
spring.autoconfigure.exclude=

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never
