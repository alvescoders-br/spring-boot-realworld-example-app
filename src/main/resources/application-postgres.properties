# Phase 4 Slice 2 (#19): PostgreSQL/JPA/Flyway foundation profile.
# Keep the default SQLite/MyBatis path intact until repository parity is proven.
spring.datasource.url=${REALWORLD_POSTGRES_URL:jdbc:postgresql://localhost:5432/realworld}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${REALWORLD_POSTGRES_USERNAME:realworld}
spring.datasource.password=${REALWORLD_POSTGRES_PASSWORD:}
spring.autoconfigure.exclude=

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never
