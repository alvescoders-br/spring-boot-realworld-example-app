spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

image.default=https://static.productionready.io/images/smiley-cyrus.jpg

jwt.secret=${REALWORLD_JWT_SECRET:local-dev-only-jwt-secret-change-me}
jwt.sessionTime=86400

# Observability
spring.application.name=realworld
management.endpoints.web.exposure.include=health,info,prometheus
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
