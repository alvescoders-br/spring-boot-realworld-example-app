# Test profile: delegates to the postgres datasource configuration.
# Inherits spring.datasource.* from application-postgres.properties when both profiles are active,
# or uses the REALWORLD_POSTGRES_* env vars directly.
spring.datasource.url=${REALWORLD_POSTGRES_URL:jdbc:postgresql://localhost:55432/realworld}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${REALWORLD_POSTGRES_USERNAME:teste123}
spring.datasource.password=${REALWORLD_POSTGRES_PASSWORD:12345}
spring.datasource.hikari.maximum-pool-size=5

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never
