services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: realworld
      POSTGRES_USER: realworld
      POSTGRES_PASSWORD: realworld-local-password
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realworld -d realworld"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - realworld-postgres-data:/var/lib/postgresql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      REALWORLD_POSTGRES_URL: jdbc:postgresql://postgres:5432/realworld
      REALWORLD_POSTGRES_USERNAME: realworld
      REALWORLD_POSTGRES_PASSWORD: realworld-local-password
      REALWORLD_JWT_SECRET: local-dev-only-change-me-change-me-change-me-change-me-change-me-1234567890
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - mimir
      - alloy

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - app
      - mimir

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "33200:3200"
      - "34317:4317"
      - "34318:4318"
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo

  mimir:
    image: grafana/mimir:2.14.3
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    ports:
      - "9909:9009"
    volumes:
      - ./docker/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data/mimir

volumes:
  realworld-postgres-data:
  grafana-data:
  alloy-data:
  tempo-data:
  mimir-data:
